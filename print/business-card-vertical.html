<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Business Card (Vertical) - JP Lisa Ecke</title>
    <link rel="stylesheet" href="print.css">
</head>
<body>

    <!-- Business Card FRONT (Vertical) -->
    <div class="print-page business-card-vertical bg-navy">
        <div class="card-content-vertical">
            <!-- Stars -->
            <div class="vertical-stars">&#9733;&nbsp;&#9733;&nbsp;&#9733;</div>

            <!-- Header -->
            <div class="vertical-header">
                <h1>LISA ECKE</h1>
                <span>Justice of the Peace &bull; District 6</span>
                <div class="vertical-sub-header">Springdale Resident for 25 Years</div>
            </div>

            <!-- Portrait -->
            <div class="vertical-portrait-wrapper">
                <img src="../assets/images/lisa-hero.jpg" alt="Lisa Ecke Portrait">
            </div>

            <!-- Slogan -->
            <div class="vertical-slogan">Proven Conservative Leadership</div>

            <!-- Bullets -->
            <div class="vertical-bullets">
                <div class="vertical-bullet-item">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-6.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><rect x="11.1" y="4.5" width="1.8" height="15" rx="0.9"/><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                    <h3>Taxpayer Advocate</h3>
                </div>
                <div class="vertical-bullet-item">
                    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                    <h3>First Responders</h3>
                </div>
                <div class="vertical-bullet-item">
                    <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    <h3>Veteran Advocate</h3>
                </div>
            </div>

            <!-- Footer -->
            <div class="vertical-footer">
                <div class="party-badge">Republican</div>
                <div class="card-website" style="font-family: var(--font-heading); font-weight: 700; color: var(--accent-gold); letter-spacing: 0.5px;">JPECKE.com</div>
            </div>
        </div>
    </div>

    <!-- Business Card BACK (Vertical) -->
    <div class="print-page business-card-vertical bg-navy">
        <div class="card-content-vertical">
            <!-- Stars -->
            <div class="vertical-stars">&#9733;&nbsp;&#9733;&nbsp;&#9733;</div>

            <!-- Back Header -->
            <div class="vertical-back-text">
                <h2>RE-ELECT LISA ECKE</h2>
                <p>Scan to Donate &amp; Volunteer</p>
            </div>

            <!-- QR Code -->
            <div class="vertical-qr-wrapper">
                <img src="assets/qr-code.png" alt="QR Code JPECKE.com">
            </div>

            <!-- Back Footer -->
            <div class="vertical-back-footer">
                <div class="card-website" style="font-family: var(--font-heading); font-weight: 700; color: var(--accent-gold); font-size: 0.7rem; letter-spacing: 0.5px; margin-bottom: 2px;">JPECKE.com</div>
                <span>Campaign@jpecke.com</span>
            </div>
        </div>
    </div>

</body>
</html>
